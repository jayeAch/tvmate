name: Download & Publish IPTV Playlist

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download playlist and EPG
        run: |
          curl -fsSL "${{ secrets.TVMATE_URL }}" -o playlist.m3u
          curl -fsSL "${{ secrets.EPG_URL }}" -o epg.xml
          perl -i -pe 's/(group-title=")([^"]+?)(\s+")/$1$2"/g' playlist.m3u

      - name: Verify downloads
        run: |
          if [ ! -s playlist.m3u ]; then
            echo "Playlist download failed or empty file"
            exit 1
          fi
          if [ ! -s epg.xml ]; then
            echo "EPG download failed or empty file"
            exit 1
          fi
          head -1 playlist.m3u
          wc -l playlist.m3u
          wc -c epg.xml

      - name: Delete existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest-playlist --yes --repo ${{ github.repository }} 2>/dev/null || true

      - name: Create/update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest-playlist \
            --repo ${{ github.repository }} \
            --title "Latest IPTV Playlist" \
            --notes "Auto-updated every 6 hours. Last update: $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --latest \
            playlist.m3u \
            epg.xml
